name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad chalega
  workflow_dispatch:      # Manual run karne ke liye

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      # Job.yaml mein completions 5 tha, isliye yahan 0 se 4 tak matrix hai
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt [cite: 5]
          # Rclone install karna
          curl https://rclone.org/install.sh | sudo bash [cite: 2]

      - name: Configure Rclone
        run: |
          mkdir -p /home/runner/.config/rclone/
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > /home/runner/.config/rclone/rclone.conf
          # Scraper script /root/.config/rclone/ dhoondta hai, isliye symlink banate hain [cite: 3]
          sudo mkdir -p /root/.config/rclone/
          sudo cp /home/runner/.config/rclone/rclone.conf /root/.config/rclone/rclone.conf

      - name: Run Scraper
        env:
          NODE_INDEX: ${{ matrix.node }}
          TOTAL_NODES: 5
          [cite_start]LINKS_FILE: "links.txt" [cite: 4]
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          python scraper.py
