name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        shell: bash
        env:
          MY_RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          # Purani kisi bhi config ko saaf karna taake script confuse na ho
          sudo rm -rf /root/.config/rclone/
          mkdir -p /home/runner/.config/rclone/
          
          # Secret ko sahi format mein file mein likhna
          printf "%s\n" "$MY_RCLONE_CONFIG" > /tmp/rclone.conf
          
          # Is file ko root ke path par bhi copy kar dein taake scraper.py ko mil jaye
          sudo mkdir -p /root/.config/rclone/
          sudo cp /tmp/rclone.conf /root/.config/rclone/rclone.conf

      - name: Run Scraper
        env:
          NODE_INDEX: ${{ matrix.node }}
          TOTAL_NODES: 5
          LINKS_FILE: "scraper/links.txt"
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          python scraper/scraper.py
