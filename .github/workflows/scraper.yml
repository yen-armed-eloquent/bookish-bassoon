name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r scraper/requirements.txt [cite: 5]

      - name: Install Rclone
        [cite_start]run: curl https://rclone.org/install.sh | sudo bash [cite: 2]

      - name: Configure Rclone
        # Secret ko seedha /tmp/ folder mein daalna
        run: |
          echo "${{ secrets.RCLONE_CONFIG }}" > /tmp/rclone.conf

      - name: Run Scraper
        env:
          NODE_INDEX: ${{ matrix.node }}
          TOTAL_NODES: 5
          [cite_start]LINKS_FILE: "scraper/links.txt" [cite: 4]
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          python scraper/scraper.py
