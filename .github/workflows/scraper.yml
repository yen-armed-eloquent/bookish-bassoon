name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *' # Har 6 ghante baad automation ke liye
  workflow_dispatch:      # Manual button se chalane ke liye

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      # 5 nodes parallel mein chalenge (0 se 4)
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false # Agar ek node fail ho to baaki rukna nahi chahiye

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          [cite_start]python-version: '3.11' # Dockerfile ke mutabiq [cite: 1]

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt # httpx aur loguru install karega 

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        run: |
          # Secret se config create karna
          mkdir -p /home/runner/.config/rclone/
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > /home/runner/.config/rclone/rclone.conf
          
          # Script /root/.config/rclone/ check karta hai isliye wahan copy karna 
          sudo mkdir -p /root/.config/rclone/
          sudo cp /home/runner/.config/rclone/rclone.conf /root/.config/rclone/rclone.conf

      - name: Run Scraper
        env:
          [cite_start]NODE_INDEX: ${{ matrix.node }} # Matrix se index uthayega 
          TOTAL_NODES: 5
          LINKS_FILE: "links.txt"
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          python scraper.py
