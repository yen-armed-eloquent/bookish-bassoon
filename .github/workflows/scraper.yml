name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          [cite_start]python-version: '3.11' # Dockerfile base image ke mutabiq [cite: 1]

      - name: Install Dependencies
        run: |
          # httpx aur loguru requirements file se install honge [cite: 5]
          pip install -r scraper/requirements.txt 

      - name: Install Rclone
        [cite_start]run: curl https://rclone.org/install.sh | sudo bash # [cite: 1, 2]

      - name: Configure Rclone Securly
        env:
          M_USER: ${{ secrets.MEGA_USER }}
          M_PASS: ${{ secrets.MEGA_PASS }}
        run: |
          # Rclone config commands secrets use karengi
          rclone config create vfx mega user "$M_USER" pass "$M_PASS"
          
          # Scraper script ki requirements ke liye config copy karna [cite: 3]
          mkdir -p /tmp/
          cp ~/.config/rclone/rclone.conf /tmp/rclone.conf
          sudo mkdir -p /root/.config/rclone/
          sudo cp ~/.config/rclone/rclone.conf /root/.config/rclone/rclone.conf

      - name: Run Scraper
        env:
          NODE_INDEX: ${{ matrix.node }}
          TOTAL_NODES: 5
          [cite_start]LINKS_FILE: "scraper/links.txt" # [cite: 4]
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          python scraper/scraper.py
