name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        run: |
          # 1. Direct command se remote create karna (Aapke terminal log ke mutabiq)
          rclone config create vfx mega user "enragedoatmeal6@sharebot.net" pass "pSA-V5KmqyBGeFat2G-EMcU3wNLIGW2sKpTibQ"
          
          # 2. Config file ko script ki expected locations par copy karna
          mkdir -p /tmp/
          cp ~/.config/rclone/rclone.conf /tmp/rclone.conf
          sudo mkdir -p /root/.config/rclone/
          sudo cp ~/.config/rclone/rclone.conf /root/.config/rclone/rclone.conf
          echo "✅ Remote 'vfx' created and config files placed."

      - name: Run Scraper
        env:
          NODE_INDEX: ${{ matrix.node }}
          TOTAL_NODES: 5
          LINKS_FILE: "scraper/links.txt"
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          python scraper/scraper.py
