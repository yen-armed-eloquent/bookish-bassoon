name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          # Path update ki gayi hai: scraper/requirements.txt
          pip install -r scraper/requirements.txt

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        run: |
          mkdir -p /home/runner/.config/rclone/
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > /home/runner/.config/rclone/rclone.conf
          sudo mkdir -p /root/.config/rclone/
          sudo cp /home/runner/.config/rclone/rclone.conf /root/.config/rclone/rclone.conf

      - name: Run Scraper
        env:
          NODE_INDEX: ${{ matrix.node }}
          TOTAL_NODES: 5
          # Links file ki path update ki: scraper/links.txt
          LINKS_FILE: "scraper/links.txt"
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          # Script ki path update ki: scraper/scraper.py
          python scraper/scraper.py
