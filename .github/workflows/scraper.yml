name: TikTok Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r scraper/requirements.txt

      - name: Install Rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure Rclone
        # Heredoc method multiline secret ko sahi se handle karta hai
        run: |
          cat <<EOF > /tmp/rclone.conf
          ${{ secrets.RCLONE_CONFIG }}
          EOF

      - name: Run Scraper
        env:
          NODE_INDEX: ${{ matrix.node }}
          TOTAL_NODES: 5
          LINKS_FILE: "scraper/links.txt"
          OUTPUT_DIR: "output"
        run: |
          mkdir -p output
          python scraper/scraper.py
